<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- ### 2.1 Lists
- [ ] Unordered lists — `<ul>`, `<li>`
- [ ] Ordered lists — `<ol>` (with `type`, `start`, `reversed`)
- [ ] Nested lists
- [ ] Description lists — `<dl>`, `<dt>`, `<dd>` -->
    <h3 id="lists">Unordered lists — ul, ol</h3>
    <ol start="10">
        <li value ="56">The game starts at 1</li>
        <li>Ends at 5pm </li>
    </ol>
    <ul >
        <li >cat</li>
        <li>dog</li>
    </ul>
    <ol reversed>
    <li>Item</li>
    <li>Some Other Item</li>
    <li value="4">A Reset Item</li>
    <li>Another Item</li>
    <li>Yet Another Item</li>
    </ol>

    <ol type="I">
        <li>apple </li>
        <li>bat</li>
        <li>cat</li>
    </ol>

    <h4>nested lists </h4>
    <ul>
        <li>itm1</li>
        <li>itm1</li>
        <ol>
            <li>hello</li>
            <li>bye </li>
            <li>bross</li>
        </ol>
        <li>final lis</li>
    </ul>
</body>
</html>
