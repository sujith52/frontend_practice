<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box model</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 100px;
            height: 100px;
            background: lightblue;
        }
        .bx1{
            padding: 20px;
            margin: 10px;
            border: 2px solid red;
        }

        .bx2{
            box-sizing: border-box;
            padding: 20px;
            margin: 10px;
            border: 2px solid red;
        }
    </style>
</head>
<body>
    <h4>box model</h4>
    <h1 class="box bx1">box 1</h1>
    <h1 class="box bx2">box 2</h1>
    
</body>
</html>
