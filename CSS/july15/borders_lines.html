<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>borders things !</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background: lightpink;
            
        }
        
        .boxx{
            border: 20px solid red;
            border-image: linear-gradient(to right, green 10% , blue 10%,orange );
            border-image-slice: 1;
        }
    </style>
</head>
<body>
    <div class="box" style="border-bottom-right-radius: 50px;"></div>
    <div class="box" style="border-bottom-left-radius: 50px;"></div>
    <div class="box" style="border-top-right-radius: 50px;"></div>
    <div class="box" style="border-top-left-radius: 50px;"></div>
    <div class="box" style="border-radius: 20px; margin: 5px;"></div>
    <div class="box" style="border-style: dashed; border-collapse: separate; border-spacing: 10px;"></div>
    <div class="box boxx" ></div>

</body>
</html>
