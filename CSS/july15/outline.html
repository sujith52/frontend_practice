<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the otlines !</title>
    <style>
        p{
            border: 1px solid black;
            outline-color: blue;
            line-height: 40px;
        }

    </style>
</head>
<body>
    <h2>Outlines like dotted and solid lines </h2>
    <p style="outline-style: dotted;">this is the lines </p>
    <p style="outline-style: dashed;">this is the lines </p>
    <p style="outline-style: solid;">this is the lines </p>
    <p style="outline-style: double;">this is the lines </p>
    <p style="outline-style: groove;">this is the lines </p>
    <p style="outline-style: ridge;">this is the lines </p>
    <p style="outline-style: inset;">this is the lines </p>

</body>
</html>
