<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layouts control </title>
    <style>
        .main{
            background-color: lightgreen;
            display: inline;
            padding: 5px;
            border: 2px dashed gray;
        }
        .unor li{
            background-color: lightsalmon;
            display: block;
            padding: 5px;
            border: 2px dashed lightskyblue;
        }
        .lines li{
            display: inline-block;
            background-color: lightgray;
            padding: 2;
            border: 2px solid lightblue;
        }
    </style>
</head>
<body>
    <h5>layouts controll</h5>
    <h6>the inline contol</h6>
    <ul >
        <li class="main">sujith</li>
        <li class="main">sreevan</li>
        <li class="main">lalith pawan</li>
    </ul>
    <br>
    <h6>the block display controls !</h6>
    <ol class="unor">
        <li>hello</li>
        <li>bye</li>
        <li> good night</li>
    </ol>
    <h6>the inline block </h6>
    <ul class="lines">
        <li>anna</li>
        <li>namsthe</li>
        <li>hello</li>
    </ul>
</body>
</html>
