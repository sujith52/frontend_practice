<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .box{
            padding: 5px 5px;
            margin: 5px;
            background-color: lightgray;
            border: 2px dashed blue;
        }
    </style>
</head>
<body>
    <h5>Grids </h5>
    <div style="display: grid; grid-column: 50px 50px; grid-row: 50px;">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
