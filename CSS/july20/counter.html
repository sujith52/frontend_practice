<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Styles </title>
    <style>
        ul{
            /* list-style-position: outside; */
            /* list-style-type: none; */
            /* margin: 0;
            padding: 0; */

            /* list-style-type: disc; */
            list-style: square;
        }
        body{
            counter-reset: item-counter;
        }
        .item{
            counter-increment: item-counter;
        }
        .item::before{
            content: counter(item-counter, upper-roman) ". ";
        }
    </style>
</head>
<body>
    <h4>List Styles </h4>
    <hr>
    <ul>
        <li>hi</li>
        <li>hello</li>
        <li>someday</li>
    </ul>
    <h2>counter </h2><hr>
    <ol>
        <li class="item">item num 1</li>
        <li class="item">item num 1</li>
        <li class="item">item num 1</li>
    </ol>
    <ul>
        <li class="item"> hi </li>
    </ul>
</body>
</html>
