<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cursor </title>
    <style>
        .main{
            cursor: row-resize;
            height: 500px;
            width: 300px;
            background: lightblue;
        }
        .box{
            width: 150px;
            height: 150px;
            background-color: lightgreen;
            margin: 20px;
        }
        .box:hover{
            box-shadow: 0px 0px 8px 2px #4444;
        }
        img:nth-of-type(1){
            shape-outside: circle(90px at 50% 50%);
            shape-margin: 30px;
            float: left;
            width: 80px;
            width: 90px;
        }
        img:nth-of-type(2){
            shape-outside: circle(90px at 50% 50%);
            float: right;
            width: 80px;
            width: 90px;
        }
        .floats p{
            text-align: center;
        }

    </style>
</head>
<body>
    <h1>cursor </h1>
    <div class="main"></div>
    <hr>
    <h1>box shadow </h1>
    <div class="box"></div>
    <div class="floats">
        <img src="https://cdn.scribblehub.com/images/5/Li-Qiye-in-Marvel_116000_1588248765.jpg" alt="emperor domination ">
        <img src="https://cdn.scribblehub.com/images/5/Li-Qiye-in-Marvel_116000_1588248765.jpg" alt="emperor domination ">
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Nemo dolorum veritatis eius, numquam aperiam.</p>

    </div>
</body>
</html>
