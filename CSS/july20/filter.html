<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filters </title>
</head>
<body>
    <h4>Bluring the image </h4>
    <img src="https://images.pexels.com/photos/15805492/pexels-photo-15805492.jpeg?cs=srgb&dl=pexels-ron-hopper-15805492.jpg&fm=jpg" alt="duck"
    style="width: 200px; filter: blur(1px);">
    <hr>
    <h1 style="filter: drop-shadow(10px 10px 1px green);">my shadow </h1>
    <img src="https://images.pexels.com/photos/15805492/pexels-photo-15805492.jpeg?cs=srgb&dl=pexels-ron-hopper-15805492.jpg&fm=jpg" alt="duck"
    style="width: 200px; filter: hue-rotate(120deg);">
    <hr>
    <img src="https://images.pexels.com/photos/15805492/pexels-photo-15805492.jpeg?cs=srgb&dl=pexels-ron-hopper-15805492.jpg&fm=jpg" alt="duck"
    style="width: 200px; filter: brightness(80%) contrast(20) sepia(100%) invert(100%);">
    <hr>
    <img src="https://images.pexels.com/photos/15805492/pexels-photo-15805492.jpeg?cs=srgb&dl=pexels-ron-hopper-15805492.jpg&fm=jpg" alt="duck"
    style="width: 200px; filter: invert(100%);">
    <h5>inverting the color !</h5>
    <hr>
    <h4>grey scale </h4>
    <img src="https://images.pexels.com/photos/15805492/pexels-photo-15805492.jpeg?cs=srgb&dl=pexels-ron-hopper-15805492.jpg&fm=jpg" alt="duck"
    style="width: 200px; filter: grayscale(80%);">

</body>
</html>
