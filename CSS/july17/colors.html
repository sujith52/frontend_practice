<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>important tags</title>
    <style>
        .div{color: lightblue;}
        h1{color: lightpink !important;}
    </style>
</head>
<body>
    <div>
        <h1>hello</h1>
    </div>
    <h1 style="color: red;">the example </h1>
    <div>
        <h4 style="color: lightblue; background: whitesmoke; padding: 20px; border: 5px dashed currentColor;
                    box-shadow: 0 0 6px currentColor;">
            the color
        </h4>
        <div style="width: 250px; height: 200px; background-color: rgba(0, 0, 0,0.1);"></div>
    </div>

<div style="width: 250px; height: 200px; background-color: #0000ff;"></div><br>
<div style="width: 250px; height: 200px; background-color: #00f;"></div>

<div style="width: 250px; height: 200px; background-color: hsl(200, 150%, 60%);"></div>
<div style="width: 250px; height: 200px; opacity: 0.8; background: lightgoldenrodyellow;"></div>

</body>
</html>
