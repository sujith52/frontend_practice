<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>measurements in css</title>
    <style>
        input[type ="button"]{
            padding: 5px 10px;
            margin: 10px;
            font-size: 1rem;
        }
        input[type = "text"]{
            padding: 10px 5px;
            margin: 10px;
            font-size: 1rem;
        }
        input[type="range"]{
            padding: 10px 5px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div>
        <h6>measurements </h6>
        <input type="button" value="click me"><br>
        <input type="text" name="" id="" placeholder="enter the text ">
        <br>
        <input type="range" name="Age " minlength="10" maxlength="50">
    </div>
    <div>
        <p style="font-size: 16px;">the 16 px font size </p>
        <p style="font-size: 1rem;">the 1 rem font size </p>
    </div>
    <div style="width: 20vw; height: 20vh; background: lightslategray;">

    </div>





</body>
</html>
