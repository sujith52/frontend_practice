<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .boxx{width: 250px; height: 150px;}
        .l1{background: linear-gradient(to left, green, blue);}
        .radial{background: radial-gradient(ellipse farthest-corner at top left,green,blue); color: whitesmoke;}
        .repeatline{background: repeating-radial-gradient(red , red 10%, green 10% , green 20%);}
        .linearrepeat{background: repeating-linear-gradient(-40deg, white , white 10%, black 10%, black 20%); color: lightgray;}
        .bgimg{background-image: url("https://static.wikia.nocookie.net/ae35e8ea-8ac9-4cea-917b-f4837c63e35c/scale-to-width/755"); background-size: cover;}



    </style>
</head>
<body>
    <h1>5.2 linear gradient </h1>
    <div class="boxx l1">
        <h1>the words are amazing </h1>
    </div>
    <div class="boxx radial">
        <p>the effect is so good bro !</p>
    </div>
    <div class="boxx repeatline">
        <h1>bulls eye </h1>
    </div>
    <div class="boxx linearrepeat">
        <h1>bulls eye </h1>
    </div>
    <div class="boxx bgimg">
        <h4>Emperor</h4>
    </div>
    <div class="boxx" style="background: border-box red;">
        <h1>hello</h1>
    </div>
    <div style="background-size: 50px 50px; color: white; background: linear-gradient(to left , green, black);">
        <p>well</p>
    </div>
</body>
</html>
