<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transistions </title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: lightcyan;
            box-shadow: 0 0 8px black;
            margin: 20px;
            transition: background-color 2s;
        }
        .box:hover{
            background-color: green;
            box-shadow: 0 0 20px lightgreen;
            border-radius: 50%;
        }

        div {
            height: 100px;
            width: 100px;
            border: 1px solid;
            transition-property: height, width;
            transition-duration: 500ms, 2s;
            transition-timing-function: linear;
            transition-delay: 0s, 0s;
        }
        div:hover {
            height: 200px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h4>Transistions like hover etc </h4>
    <div class="box" >

    </div>
    <div></div>
</body>
</html>
