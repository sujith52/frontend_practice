<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables </title>
    <style>
        .tabless{
            table-layout: fixed;
            width: 120px;
            border: 2px solid ;
            empty-cells: hide;
            /* border-collapse: collapse; */
            border-spacing: 4px;
            caption-side: bottom;
        }
        td{
            border: 2px solid black;
        }
        th{
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <h5>Tables and the borders ! </h5>
    <table class="tabless">
        <caption>the table on the things</caption>
        <tr>
            <th>hello</th>
            <th>bye</th>
        </tr>
        <tr>
            <td>main</td>
            <td>the new </td>
        </tr>
        <tr>
            <td></td>
            <td>new </td>
        </tr>
    </table>
    
</body>
</html>
